"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$fill \
$jobs\
$line_break\
$character"""

[directory]
truncation_length = 0
style = "blue"

[character]
# success_symbol = "[‚ùØ](purple)"
# error_symbol = "[‚ùØ](red)"
# vimcmd_symbol = "[‚ùÆ](green)"
success_symbol = "[‚ùÆ^_^‚ùØ](bold green)"
error_symbol   = "[‚ùÆ@_@‚ùØ](bold red)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[fill]
symbol = ' '

[jobs]
symbol = '‚ú¶ '

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
